model: gemma3:12b

validation:
  require_abstract: false

fields:
  - key: title
    type: string
  - key: year
    type: number
  - key: authors
    type: list
  - key: affiliation
    type: list
  - key: journal
    type: string
  - key: doi
    type: string
  - key: keywords
    type: list
  - key: msc
    type: list
    description: "本文に明記されているMSC分類"
  - key: arxiv_category
    type: string
    description: "本文に明記されているarXivカテゴリ（例: cs.AI）"
  - key: summary_ja
    type: string
    description: 日本語の要約

rename:
  author_key: authors
  year_key: year
  title_key: title

prompt:
  instructions: >
    Extract only what is explicitly written on the page for factual fields.
    For summary_ja, generate a short Japanese summary in 2-4 sentences based on the page.
    If a field is missing, use an empty string or empty array.
